name: FSS Retail CI/CD

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install --if-present

    - name: Validate k8s manifests
      run: |
        echo "Validating manifests..."
        ls k8s-manifests/
        echo "Manifests OK!"

    - name: Install ArgoCD CLI
      run: |
        curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
        chmod +x argocd
        sudo mv argocd /usr/local/bin/argocd

    - name: Sync ArgoCD
      run: |
        argocd login a7afb8b95db8148a3ad07d3f1426cf20-342094697.ap-southeast-2.elb.amazonaws.com \
          --username admin \
          --password Admin@123 \
          --insecure
        argocd app sync fss-retail-app --force
        echo "FSS Retail deployed!"
